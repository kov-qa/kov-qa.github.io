<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {

}

/* ── Scrollbar ────────────────────────────────────────────────────────── */

::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #262626; border-radius: 9999px; }

/* ── Utilities ────────────────────────────────────────────────────────── */
.y2k { font-family: 'Playfair Display', serif; font-weight: 700; font-style: italic; }
.glass {
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.10);
}
@media (max-width: 768px) {
  .glass {

  /* Pause video on mobile to save battery/CPU */
  .hero-video-wrap video { display: none; }

}
.smooth-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,.5); }

#header {

}

}

/* ── Collection ───────────────────────────────────────────────────────── */
#collection {

/* ── Wavy Divider ─────────────────────────────────────────────────────── */
.wave-divider {
  position: relative; height: 55px; overflow: hidden; pointer-events: none;
  background: linear-gradient(180deg, rgba(10,10,10,0) 0%, rgba(10,10,10,1) 100%);
  border-top: 1px solid rgba(255,255,255,.34);
  border-bottom: 1px solid rgba(255,255,255,.24);
  z-index: 4;
}
.wave-divider::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 16px;
  background: #0a0a0a;
  pointer-events: none;
  z-index: 3;
}
.wave-divider svg {
  position: absolute; width: 100%; height: 100%;
  top: 0; left: 0; display: block;
  -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 62%, rgba(0,0,0,.55) 78%, rgba(0,0,0,.12) 90%, transparent 100%);
  mask-image: linear-gradient(90deg, #000 0%, #000 62%, rgba(0,0,0,.55) 78%, rgba(0,0,0,.12) 90%, transparent 100%);
  z-index: 2;
}
.wave-divider + section {
  border-top: 1px solid rgba(255,255,255,.2);
}
.wave-line { fill: none; stroke: rgba(255,255,255,.38); stroke-width: 1.6; }
.wave-line.accent { stroke: rgba(255,255,255,.62); stroke-width: 1.2; }

/* No animation - transform управляется JavaScript */
.wave-divider .wave-g1 { will-change: transform; }
.wave-divider .wave-g2 { will-change: transform; }
.wave-divider .wave-g3 { will-change: transform; }

/* ── Collection Spikes Animation ──────────────────────────────────────── */
.collection-spikes {
  position: absolute;
  inset: 0;
  height: 100%;
  pointer-events: none;
  overflow: visible;
  z-index: 0;
}
.collection-spikes-side {
  position: absolute;
  left: 0;
  width: 100%;
  height: clamp(140px, 24vh, 300px);
  opacity: 0;
  will-change: opacity, transform;
  mix-blend-mode: screen;
  transform: translateY(0);
  transition: opacity .35s ease;
  overflow: visible;
}
.collection-spikes-side.left {
  top: -180px;
}
.collection-spikes-side.right {
  bottom: -150px;
  transform: scaleY(-1);
}
.collection-spikes-side svg {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  display: block;
  overflow: visible;
  shape-rendering: auto;
  transform: translateZ(0);
  filter: blur(0.45px);
  -webkit-filter: blur(0.45px);
}
.collection-spikes .spike-group { will-change: transform, opacity; }
.collection-spikes .spike-group polygon {
  fill: rgba(255,255,255,0.52);
  stroke: none;
}
#collection .section-label,
#collection .grid {
  position: relative;
  z-index: 2;
}

}
#support-btn.glass { border: 1px solid #fff; }
#support-btn:hover { transform: scale(1.1); background: rgba(255,255,255,.05); }

#support-btn svg { width: 24px; height: 24px; }
#support-btn span { font-size: 11px; text-transform: uppercase; letter-spacing: .4em; font-weight: 700; padding-right: 8px; }
@media (max-width: 768px) { #support-btn span { display: none; } }

#product-page {

#fullscreen {

.fs-close {

/* ── Page visibility ──────────────────────────────────────────────────── */
#main-page, #product-page { display: block; }

/* ── SVG icons (inline) ───────────────────────────────────────────────── */
.ico { display: block; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

@media (max-width: 768px) {

  .collection-spikes-side svg { filter: none; -webkit-filter: none; }
  .wave-divider .wave-g3 { display: none; }
  .product-card { padding: 16px; border-radius: 2rem; }
  .card-meta { margin-top: 20px; }

  #support-btn { bottom: 20px; right: 20px; padding: 14px; }

// ── State ──────────────────────────────────────────────────────────────────
let currentProduct = null;
let galleryIndex = 0;
let fsIndex = 0;

// ── Utils ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

// ── Scroll / Parallax ──────────────────────────────────────────────────────
let lastScrollY = 0;
let rafPending = false;
let isMobile = window.matchMedia('(max-width: 768px)').matches;

window.addEventListener('scroll', () => {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    const y = window.scrollY;
    const header = $('header');
    if (y > lastScrollY && y > 100) header.classList.add('hide');
    else if (y < lastScrollY) header.classList.remove('hide');
    lastScrollY = y;
    // Parallax only on desktop
    if (!isMobile) {
      $('hero-parallax').style.transform = `translateY(${y * 0.1}px)`;
      $('hero-glow').style.transform = `translate(-50%, calc(-50% + ${y * 0.2}px))`;
    }
    rafPending = false;
  });
}, { passive: true });

// ── Render product grid ────────────────────────────────────────────────────
function renderGrid(query = '') {
  const grid = $('products-grid');
  const q = query.toLowerCase();
  const filtered = PRODUCTS.filter(p =>
    q === '' ||
    p.name.toLowerCase().includes(q) ||
    p.category.toLowerCase().includes(q)
  );
  if (filtered.length === 0) {
    grid.innerHTML = '<p class="empty-msg">Ничего не найдено</p>';
    return;
  }
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="showProduct('${p.id}')">
      <div class="card-img-wrap">
        <img src="${p.images[0]}" alt="${p.name}" referrerpolicy="no-referrer" loading="lazy" />
      </div>
      <div class="card-meta">
        <div class="card-name">${p.name}</div>
        <div class="card-price">Скоро</div>
        <p class="card-desc">${p.description}</p>
        <button class="order-btn" style="margin-top:24px" onclick="event.stopPropagation(); window.open('https://t.me/r0fl1s', '_blank')">Заказать</button>
      </div>
    </div>
  `).join('');
}


// ── Navigation ─────────────────────────────────────────────────────────────
function showProduct(id) {
  currentProduct = PRODUCTS.find(p => p.id === id);
  if (!currentProduct) return;
  galleryIndex = 0;

  // Swap visibility
  $('main-page').classList.add('hidden');
  $('product-page').classList.remove('hidden');
  $('header').classList.remove('hide');
  $('header').style.display = 'none'; // hide on product page (back btn takes over)
  window.scrollTo(0, 0);

  renderGallery();
  renderProductInfo();
}

function showMain() {
  $('product-page').classList.add('hidden');
  $('main-page').classList.remove('hidden');
  $('header').style.display = '';
  window.scrollTo(0, 0);
}

// ── Gallery ────────────────────────────────────────────────────────────────
function renderGallery() {
  const wrap = $('gallery-wrap');
  wrap.querySelectorAll('.gallery-img').forEach(el => el.remove());

  currentProduct.images.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = `${currentProduct.name} ${i + 1}`;
    img.className = 'gallery-img';
    img.referrerPolicy = 'no-referrer';
    img.loading = 'lazy';
    // First 2 = flat product shots (contain), rest = model shots (cover)
    img.style.objectFit = i < 2 ? 'contain' : 'cover';
    img.style.display = i === galleryIndex ? 'block' : 'none';
    if (i === galleryIndex) img.addEventListener('click', openFullscreen);
    wrap.appendChild(img); // ← FIX: was insertBefore which reversed order
  });

  renderDots();
}

function galleryPaginate(dir) {
  if (!currentProduct) return;
  const imgs = Array.from($('gallery-wrap').querySelectorAll('.gallery-img'));
  const len = imgs.length;
  const prev = galleryIndex;
  galleryIndex = ((galleryIndex + dir) % len + len) % len;

  // Animate out
  imgs[prev].style.transition = 'transform .3s ease, opacity .25s ease';
  imgs[prev].style.transform = dir > 0 ? 'translateX(-100%)' : 'translateX(100%)';
  imgs[prev].style.opacity = '0';
  setTimeout(() => { imgs[prev].style.display = 'none'; imgs[prev].style.transform = ''; }, 300);

  // Animate in
  const next = imgs[galleryIndex];
  next.style.transition = 'none';
  next.style.transform = dir > 0 ? 'translateX(100%)' : 'translateX(-100%)';
  next.style.opacity = '0';
  next.style.display = 'block';
  imgs.forEach(img => img.removeEventListener('click', openFullscreen));
  next.addEventListener('click', openFullscreen);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    next.style.transition = 'transform .3s ease, opacity .25s ease';
    next.style.transform = 'translateX(0)';
    next.style.opacity = '1';
  }));

  renderDots();
}

function renderDots() {
  $('gallery-dots').innerHTML = currentProduct.images.map((_, i) => `
    <button class="dot${i === galleryIndex ? ' active' : ''}" onclick="galleryGoTo(${i})"></button>
  `).join('');
}

function galleryGoTo(i) {
  if (i === galleryIndex) return;
  const imgs = Array.from($('gallery-wrap').querySelectorAll('.gallery-img'));
  imgs.forEach((img, idx) => {
    img.style.display = idx === i ? 'block' : 'none';
    img.style.transform = '';
    img.style.opacity = '';
    img.removeEventListener('click', openFullscreen);
  });
  imgs[i].addEventListener('click', openFullscreen);
  galleryIndex = i;
  renderDots();
}

// ── Product info ───────────────────────────────────────────────────────────
function renderProductInfo() {
  const p = currentProduct;
  const info = $('product-info');
  info.innerHTML = `
    <div>
      <div class="product-name">${p.name}</div>
      <div class="product-price" style="margin-top:32px">Скоро</div>
    </div>
    <p class="product-desc">${p.description}</p>
    ${p.composition ? `
      <div>
        <p class="composition-label">Состав:</p>
        <p class="composition-text">${p.composition}</p>
      </div>
    ` : ''}
    <button class="order-btn" onclick="window.open('https://t.me/r0fl1s', '_blank')">Заказать</button>
  `;
}

// ── Fullscreen ─────────────────────────────────────────────────────────────
function openFullscreen() {
  if (!currentProduct) return;
  fsIndex = galleryIndex;
  renderFsImage();
  $('fullscreen').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFullscreen() {
  $('fullscreen').classList.remove('open');
  document.body.style.overflow = '';
}
function fsPaginate(dir) {
  const len = currentProduct.images.length;
  const prev = fsIndex;
  fsIndex = ((fsIndex + dir) % len + len) % len;

  const old = $('fs-content').querySelector('.fs-img');
  if (old) {
    old.style.transition = 'transform .3s ease, opacity .2s ease';
    old.style.transform = dir > 0 ? 'translateX(-100%) scale(.8)' : 'translateX(100%) scale(.8)';
    old.style.opacity = '0';
    setTimeout(() => old.remove(), 300);
  }

  const img = document.createElement('img');
  img.src = currentProduct.images[fsIndex];
  img.className = 'fs-img';
  img.referrerPolicy = 'no-referrer';
  img.style.transform = dir > 0 ? 'translateX(100%) scale(.8)' : 'translateX(-100%) scale(.8)';
  img.style.opacity = '0';
  $('fs-content').appendChild(img);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    img.style.transition = 'transform .3s cubic-bezier(.25,.46,.45,.94), opacity .2s ease';
    img.style.transform = 'translateX(0) scale(1)';
    img.style.opacity = '1';
  }));
}
function renderFsImage() {
  const content = $('fs-content');
  content.querySelectorAll('.fs-img').forEach(el => el.remove());
  const img = document.createElement('img');
  img.src = currentProduct.images[fsIndex];
  img.className = 'fs-img active';
  img.referrerPolicy = 'no-referrer';
  img.style.opacity = '1';
  img.style.transform = 'translateX(0) scale(1)';
  content.appendChild(img);
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if ($('fullscreen').classList.contains('open')) {
    if (e.key === 'Escape') closeFullscreen();
    if (e.key === 'ArrowRight') fsPaginate(1);
    if (e.key === 'ArrowLeft') fsPaginate(-1);
  }
});

// Swipe on fullscreen
let fsSwipeX = null;
$('fs-content').addEventListener('touchstart', e => { fsSwipeX = e.touches[0].clientX; });
$('fs-content').addEventListener('touchend', e => {
  if (fsSwipeX === null) return;
  const diff = e.changedTouches[0].clientX - fsSwipeX;
  if (Math.abs(diff) > 50) fsPaginate(diff < 0 ? 1 : -1);
  fsSwipeX = null;
});

// ── Hero Frame ─────────────────────────────────────────────────────────────
function drawHeroFrame() {
  const svg = document.getElementById('hero-frame-svg');
  const wrap = svg.parentElement;
  const W = wrap.offsetWidth;
  const H = wrap.offsetHeight;
  const ns = 'http://www.w3.org/2000/svg';

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';

  const defs = document.createElementNS(ns, 'defs');
  defs.innerHTML = `
    <filter id="scribble1" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.06" numOctaves="5" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="scribble2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05 0.03" numOctaves="4" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="10" xChannelSelector="G" yChannelSelector="R"/>
    </filter>
    <filter id="scribble3" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.06 0.04" numOctaves="3" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8" xChannelSelector="R" yChannelSelector="B"/>
    </filter>
  `;
  svg.appendChild(defs);

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,String(v)));
    return e;
  }

  const p = 6;
  const strokes = [
    { x:0,   y:0,     w:W,     h:H,     sw:9,  filter:'scribble1', op:'0.85' },
    { x:-3,  y:-3,    w:W+6,   h:H+6,   sw:6,  filter:'scribble2', op:'0.6'  },
    { x:p,   y:p,     w:W-p*2, h:H-p*2, sw:7,  filter:'scribble3', op:'0.5'  },
    { x:2,   y:2,     w:W-4,   h:H-4,   sw:4,  filter:'scribble1', op:'0.4'  },
    { x:-6,  y:-2,    w:W+12,  h:H+4,   sw:3,  filter:'scribble2', op:'0.3'  },
  ];

  strokes.forEach(({x,y,w,h,sw,filter,op}) => {
    svg.appendChild(el('rect', {
      x, y, width:w, height:h,
      fill:'none', stroke:'rgba(255,255,255,1)',
      'stroke-width': sw,
      filter: `url(#${filter})`,
      opacity: op,
    }));
  });
}

function drawCornerSpikes(svg, W, H, seed, count, lengthScale = 1, origin = 'right') {
  if (!svg) return;
  const ns = 'http://www.w3.org/2000/svg';

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';

  // origin: bottom-right (default) or bottom-left
  const cx = origin === 'left' ? 0 : W;
  const cy = H;

  function rng(seed) {
    let s = seed;
    return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
  }
  const rand = rng(seed);

  const COUNT = isMobile ? Math.max(28, Math.floor(count * 0.55)) : count;
  // from Math.PI (left) sweeping to 3π/2 (up) — quarter circle going left+up
  for (let i = 0; i < COUNT; i++) {
    const t = i / (COUNT - 1);
    const angle = origin === 'left'
      ? (Math.PI * 1.5 + t * (Math.PI / 2))
      : (Math.PI + t * (Math.PI / 2));

    const base = Math.max(W, H);
    const len = ((base * 0.65 + rand() * base * 0.35) * (0.6 + rand() * 0.6)) * lengthScale;
    const wobble = (rand() - 0.5) * 0.04;
    const a = angle + wobble;

    const tipX = cx + Math.cos(a) * len;
    const tipY = cy + Math.sin(a) * len;

    const halfW = 1.5 + rand() * 3.5;
    const perpX = Math.cos(a + Math.PI / 2) * halfW;
    const perpY = Math.sin(a + Math.PI / 2) * halfW;

    const baseInset = rand() * W * 0.02;
    const bx = cx + Math.cos(a) * baseInset;
    const by = cy + Math.sin(a) * baseInset;

    const path = document.createElementNS(ns, 'polygon');
    path.setAttribute('points', [
      `${bx + perpX},${by + perpY}`,
      `${tipX},${tipY}`,
      `${bx - perpX},${by - perpY}`,
    ].join(' '));
    path.setAttribute('fill', 'white');
    path.setAttribute('opacity', String(0.3 + rand() * 0.5));
    svg.appendChild(path);
  }
}

function drawSpikes() {
  const svg = document.getElementById('hero-spikes');
  drawCornerSpikes(svg, window.innerWidth, window.innerHeight, 42, 80, 1, 'right');
}

function drawEthosSpikes() {
  const section = document.getElementById('ethos');

  if (!section || !svg) return;
  const W = Math.max(1, section.clientWidth);
  const H = Math.max(1, svg.clientHeight || 220);
  drawCornerSpikes(svg, W, H, 77, 64, 0.78, 'left');
}

function drawAllSpikes() {

}

// ── Wave Animation on Scroll ───────────────────────────────────────────────
// Волны управляются СКРОЛЛОМ с плавным бесконечным движением (БЕЗ РАЗРЫВОВ)
let waveScrollAnimationId = null;
const WAVE_SEAMLESS_WIDTH = 2400; // Полная ширина паттерна для плавного цикла (два дубля по 1200)
let lastWaveUpdateTs = 0;
let lastSpikeUpdateTs = 0;
let cachedWaveDividers = [];
let cachedWaveGroupsByDivider = [];
let cachedCollectionSides = [];
let cachedCollectionSpikeGroups = [];

function cacheAnimatedNodes() {
  cachedWaveDividers = Array.from(document.querySelectorAll('.wave-divider'));
  cachedWaveGroupsByDivider = cachedWaveDividers.map((divider) =>
    Array.from(divider.querySelectorAll('g[class^="wave-g"]'))
  );
  cachedCollectionSides = Array.from(document.querySelectorAll('.collection-spikes-side'));
  cachedCollectionSpikeGroups = Array.from(document.querySelectorAll('.collection-spikes .spike-group'));
}

function updateWaveScroll() {
  const now = performance.now();
  if (isMobile && now - lastWaveUpdateTs < 33) return;
  lastWaveUpdateTs = now;
  const scrollY = window.scrollY;
  const waveDividers = cachedWaveDividers;
  
  waveDividers.forEach((divider, index) => {
    const rect = divider.getBoundingClientRect();
    const isVisible = rect.top < window.innerHeight && rect.bottom > 0;
    
    if (isVisible) {
      const waveGroups = cachedWaveGroupsByDivider[index] || [];
      waveGroups.forEach((group, groupIndex) => {
        const groupSpeeds = (index === 0 ? [0.5, 0.35, 0.65] : [0.6, 0.4, 0.7]);
        const groupSpeed = groupSpeeds[groupIndex];
        const groupOffset = (scrollY * groupSpeed) % WAVE_SEAMLESS_WIDTH;
        
        // Плавное смещение без прерывания
        group.style.willChange = 'transform';
        group.style.transform = `translate(${groupOffset}px, 10px) scaleY(0.72)`;
      });
    }
  });
}

window.addEventListener('scroll', () => {
  if (waveScrollAnimationId === null) {
    waveScrollAnimationId = requestAnimationFrame(() => {
      updateWaveScroll();
      waveScrollAnimationId = null;
    });
  }
}, { passive: true });

// Инициализация на загрузке страницы
cacheAnimatedNodes();
updateWaveScroll();

// ── Collection Spikes Animation ────────────────────────────────────────
// Иглы на странице коллекции, которые анимируются при скроллинге
let spikeScrollAnimationId = null;

function generateCollectionSideSpikes(svgId, seed = 123, side = 'top') {
  const svg = document.getElementById(svgId);
  if (!svg) return;

  const W = 1200;
  const H = 220;
  const ns = 'http://www.w3.org/2000/svg';

  svg.innerHTML = '';

  // Создаём иглы от края внутрь (для бокового эффекта)
  function rng(seed) {
    let s = seed;
    return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
  }
  const rand = rng(seed);

  const SPIKE_COUNT = 70;
  
  for (let i = 0; i < SPIKE_COUNT; i++) {
    const x = (i / SPIKE_COUNT) * W;
    const y = rand() * 26;

    const angle = (rand() - 0.5) * 0.4 + Math.PI / 2;
    const len = 200 + rand() * 300;
    const width = 2 + rand() * 3.2;

    const tipX = x + Math.cos(angle) * len;
    const tipY = y + Math.sin(angle) * len;

    const perpX = Math.cos(angle + Math.PI / 2) * width;
    const perpY = Math.sin(angle + Math.PI / 2) * width;

    const polygon = document.createElementNS(ns, 'polygon');
    polygon.setAttribute('points', [
      `${x + perpX},${y + perpY}`,
      `${tipX},${tipY}`,
      `${x - perpX},${y - perpY}`,
    ].join(' '));
    polygon.setAttribute('opacity', String(0.16 + rand() * 0.5));
    
    const group = document.createElementNS(ns, 'g');
    group.setAttribute('class', 'spike-group');
    group.dataset.side = side;
    group.dataset.phase = String(i / Math.max(1, SPIKE_COUNT - 1));
    group.appendChild(polygon);
    svg.appendChild(group);
  }
}

function updateSpikesScroll() {
  const now = performance.now();
  if (isMobile && now - lastSpikeUpdateTs < 33) return;
  lastSpikeUpdateTs = now;
  const collectionSection = document.getElementById('collection');
  const sides = cachedCollectionSides;
  const productCard = document.querySelector('#products-grid .product-card');
  const isMobileViewport = (window.innerWidth || document.documentElement.clientWidth || 0) <= 768;
  
  if (!collectionSection || !sides.length) return;

  const rect = collectionSection.getBoundingClientRect();
  const sectionHeight = Math.max(rect.height, 1);
  const viewport = window.innerHeight || document.documentElement.clientHeight || 1;
  const visible = rect.top < viewport && rect.bottom > 0;
  // Более поздний старт: секция должна заметно зайти в viewport
  const startPoint = viewport * 0.72;
  const endPoint = -sectionHeight * 0.12;
  const rawProgress = (startPoint - rect.top) / (startPoint - endPoint);
  const progress = Math.max(0, Math.min(rawProgress, 1));
  const reveal = visible ? progress : 0;

  const sideH = Math.max(Math.min(viewport * 0.18, 190), 90);
  const gap = Math.max(14, Math.min(36, viewport * 0.03));
  const hiddenOffset = sideH + 60;

  let topTarget = 0;
  let bottomTarget = 0;
  if (productCard) {
    const cardRect = productCard.getBoundingClientRect();
    topTarget = Math.max(0, cardRect.top - rect.top - sideH - gap);
    bottomTarget = Math.max(0, rect.bottom - cardRect.bottom - sideH - gap);
  }

  const sideRevealTop = Math.max(0, Math.min(1, reveal / (isMobileViewport ? 0.62 : 0.58)));
  const sideRevealBottom = Math.max(
    0,
    Math.min(
      1,
      (reveal - (isMobileViewport ? 0.45 : 0.78)) / (isMobileViewport ? 0.4 : 0.22)
    )
  );

  sides.forEach((side) => {
    const isTop = side.classList.contains('left');
    const startY = isTop ? -hiddenOffset : hiddenOffset;
    const endY = isTop ? topTarget : -bottomTarget;
    // По очереди: сначала верх, затем заметно позже низ
    const sideReveal = isTop ? sideRevealTop : sideRevealBottom;
    const currentY = startY + (endY - startY) * sideReveal;
    side.style.opacity = String(Math.max(0, Math.min(0.95, sideReveal)));
    side.style.transform = isTop
      ? `translateY(${currentY}px)`
      : `translateY(${currentY}px) scaleY(-1)`;
  });

  cachedCollectionSpikeGroups.forEach((group) => {
    const isTopGroup = group.dataset.side === 'top';
    const sideReveal = isTopGroup ? sideRevealTop : sideRevealBottom;
    const phase = Number(group.dataset.phase || 0);
    // Поочерёдное раскрытие: зависит только от позиции в секции
    const gate = Math.max(0, Math.min(1, (sideReveal - phase) * 4));
    const opacityBase = isMobileViewport
      ? (0.24 + sideReveal * 0.96)
      : (0.1 + sideReveal * 0.9);
    const opacity = opacityBase * gate;
    group.style.opacity = String(opacity);
  });
}

// Инициализация игл
generateCollectionSideSpikes('collection-spikes-top-svg', 187, 'top');
generateCollectionSideSpikes('collection-spikes-bottom-svg', 271, 'bottom');
cacheAnimatedNodes();

window.addEventListener('scroll', () => {
  if (spikeScrollAnimationId === null) {
    spikeScrollAnimationId = requestAnimationFrame(() => {
      updateSpikesScroll();
      spikeScrollAnimationId = null;
    });
  }
}, { passive: true });
window.addEventListener('resize', () => {
  isMobile = window.matchMedia('(max-width: 768px)').matches;
  cacheAnimatedNodes();
  updateWaveScroll();
  updateSpikesScroll();
}, { passive: true });

// Инициализация при загрузке
updateSpikesScroll();
